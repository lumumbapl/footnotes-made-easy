name: Create docs issue

on:
  pull_request_target:
    types: [labeled]

jobs:
  create-docs-issue:
    if: github.event.label.name == 'docs-needed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Check for an existing docs issue
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.data.find(comment =>
              typeof comment.body === 'string' && comment.body.includes('Docs issue opened:')
            );

            core.setOutput('exists', existing ? 'true' : 'false');

      - name: Determine docs template
        id: meta
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          text="${PR_TITLE} ${PR_BODY}"
          lower="${text,,}"

          template_key=default
          target_doc="footnotes-made-easy/README.md"
          summary="Docs update requested from PR #${{ github.event.pull_request.number }}"

          if [[ "$lower" == *install* || "$lower" == *setup* ]]; then
            template_key=installation
            target_doc="footnotes-made-easy/installation.md"
          elif [[ "$lower" == *getting started* || "$lower" == *syntax* || "$lower" == *footnote* ]]; then
            template_key=getting-started
            target_doc="footnotes-made-easy/getting-started.md"
          elif [[ "$lower" == *pro* ]]; then
            template_key=pro-installation
            target_doc="footnotes-made-easy/pro-installation.md"
          fi

          printf 'template_key=%s\n' "$template_key" >> "$GITHUB_OUTPUT"
          printf 'target_doc=%s\n' "$target_doc" >> "$GITHUB_OUTPUT"
          printf 'summary=%s\n' "$summary" >> "$GITHUB_OUTPUT"

      - name: Create issue in docs repo
        if: steps.guard.outputs.exists != 'true'
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_REPO_PAT }}
          script: |
            const owner = 'altvisewp';
            const repo = 'docs';
            const pr = context.payload.pull_request;
            const templateKey = `${{ steps.meta.outputs.template_key }}`;
            const targetDoc = `${{ steps.meta.outputs.target_doc }}`;
            const summary = `${{ steps.meta.outputs.summary }}`;

            const body = `## Docs update request\n\n${summary}\n\n- Source PR: ${pr.html_url}\n- Plugin repo: ${context.repo.owner}/${context.repo.repo}\n- Template key: ${templateKey}\n- Target doc: ${targetDoc}\n\n<!-- docs-template: ${templateKey} -->\n<!-- docs-target: ${targetDoc} -->\n<!-- plugin-pr: ${pr.html_url} -->\n<!-- change-summary: ${pr.title.replace(/`/g, '\\`')} -->\n`;

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: `[footnotes-made-easy] Docs update: ${pr.title}`,
              body,
              labels: ['docs-needed', 'from-plugin'],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.data.number,
              body: `Requested from ${pr.html_url}.\n\nUpdated target: \`${targetDoc}\`\nTemplate: \`${templateKey}\`\nSummary: ${summary}`,
            });

            core.setOutput('issue_number', issue.data.number.toString());
            core.setOutput('issue_url', issue.data.html_url);

      - name: Comment back on the plugin PR
        if: steps.guard.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            const issueUrl = '${{ steps.issue.outputs.issue_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `Docs issue opened: ${issueUrl}`,
            });
